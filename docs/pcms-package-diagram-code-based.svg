  <text x="629" y="381" class="pkg-title">domain services</text>
  <rect class="domain" x="640" y="410" width="150" height="34"/><text x="655" y="431" class="pkg">customers-service</text>
  <rect class="domain" x="810" y="410" width="150" height="34"/><text x="825" y="431" class="pkg">vets-service</text>
  <rect class="domain" x="980" y="410" width="150" height="34"/><text x="995" y="431" class="pkg">visits-service</text>
  <rect class="domain" x="640" y="463" width="150" height="34"/><text x="655" y="484" class="pkg">billing-service</text>
  <rect class="domain" x="810" y="463" width="150" height="34"/><text x="825" y="484" class="pkg">products-service</text>
  <rect class="domain" x="980" y="463" width="150" height="34"/><text x="995" y="484" class="pkg">reviews-service</text>
  <text x="640" y="528" class="small">com.mss301.petclinic.{customers,vets,visits,billing,products,reviews}</text>

  <path class="workflow" d="M1225 365 h132 v20 h180 v165 h-312 z"/>
  <text x="1239" y="381" class="pkg-title">workflow + AI/MCP</text>
  <rect class="workflow" x="1250" y="410" width="165" height="34"/><text x="1265" y="431" class="pkg">workflow-service</text>
  <rect class="workflow" x="1250" y="460" width="165" height="34"/><text x="1265" y="481" class="pkg">genai-service</text>
  <rect class="workflow" x="1250" y="510" width="165" height="28"/><text x="1265" y="529" class="pkg">mcp-server</text>

  <!-- Internal package layout -->
  <path class="internal" d="M125 585 h246 v20 h1225 v55 h-1471 z"/>
  <text x="139" y="601" class="pkg-title">Spring service internal packages scanned under services/*/src/main/java</text>
  <rect class="internal" x="150" y="620" width="125" height="30"/><text x="177" y="639" class="pkg">controller</text>
  <rect class="internal" x="300" y="620" width="145" height="30"/><text x="330" y="639" class="pkg">dto.req / res</text>
