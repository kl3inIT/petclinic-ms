  <rect class="internal" x="1055" y="620" width="220" height="30"/><text x="1077" y="639" class="pkg">config / exception / security</text>
  <path class="solid" d="M275 635 H300"/><text class="label" x="279" y="626">DTO</text>
  <path class="solid" d="M445 635 H470"/><text class="label" x="449" y="626">uses</text>
  <path class="solid" d="M595 635 H620"/><text class="label" x="599" y="626">JPA</text>
  <path class="solid" d="M775 635 H800"/><text class="label" x="779" y="626">integration</text>

  <!-- Shared subsystem -->
  <path class="shared" d="M95 740 h75 v22 h1005 v220 h-1080 z"/>
  <text x="109" y="757" class="pkg-title">shared &lt;&lt;subsystem&gt;&gt;</text>
  <rect class="shared" x="125" y="795" width="160" height="50"/><text x="142" y="817" class="pkg-title">common-web</text><text x="142" y="835" class="small">exception | openapi</text>
  <rect class="shared" x="305" y="795" width="160" height="50"/><text x="322" y="817" class="pkg-title">common-jpa</text><text x="322" y="835" class="small">audit | entity | enums</text>
  <rect class="shared" x="485" y="795" width="180" height="50"/><text x="502" y="817" class="pkg-title">common-security</text><text x="502" y="835" class="small">jwt | endpoints</text>
  <rect class="shared" x="685" y="795" width="180" height="50"/><text x="702" y="817" class="pkg-title">common-clients</text><text x="702" y="835" class="small">RestClient | JWT forward</text>
  <rect class="shared" x="885" y="795" width="175" height="50"/><text x="902" y="817" class="pkg-title">common-events</text><text x="902" y="835" class="small">EventPublisher | saga</text>
  <rect class="shared" x="125" y="875" width="185" height="50"/><text x="142" y="897" class="pkg-title">common-testing</text><text x="142" y="915" class="small">JWT tests | Postgres IT</text>
  <text x="340" y="895" class="note">Gradle dependencies are from services/*/build.gradle.kts.</text>
  <text x="340" y="915" class="note">Domain services use common-web/jpa/security/events; common-clients appears where RestClient packages exist.</text>

  <!-- Go and external packages -->
  <path class="go" d="M1225 740 h95 v22 h185 v220 h-280 z"/>
  <text x="1239" y="757" class="pkg-title">Go services</text>
  <rect class="go" x="1250" y="795" width="220" height="44"/><text x="1265" y="815" class="pkg-title">files-service</text><text x="1265" y="833" class="small">github.com/mss301/petclinic-files</text>
  <rect class="go" x="1250" y="860" width="220" height="44"/><text x="1265" y="880" class="pkg-title">mailer-service</text><text x="1265" y="898" class="small">github.com/mss301/petclinic-mailer</text>

  <path class="external" d="M1515 315 h125 v22 h125 v400 h-250 z"/>
  <text x="1529" y="332" class="pkg-title">external</text>
  <rect class="external" x="1540" y="365" width="165" height="30"/><text x="1555" y="385" class="pkg">PostgreSQL</text>
  <rect class="external" x="1540" y="415" width="165" height="30"/><text x="1555" y="435" class="pkg">RabbitMQ</text>
  <rect class="external" x="1540" y="465" width="165" height="30"/><text x="1555" y="485" class="pkg">Eureka</text>
  <rect class="external" x="1540" y="515" width="165" height="30"/><text x="1555" y="535" class="pkg">MinIO</text>
  <rect class="external" x="1540" y="565" width="165" height="30"/><text x="1555" y="585" class="pkg">Mailpit</text>
  <rect class="external" x="1540" y="615" width="165" height="30"/><text x="1555" y="635" class="pkg">Camunda/Zeebe</text>
  <rect class="external" x="1540" y="665" width="165" height="30"/><text x="1555" y="685" class="pkg">LLM Provider</text>

  <!-- Clean package-level dependencies -->
  <path class="dep" d="M225 251 V410"/><text class="label" x="236" y="330">generated REST client</text>
  <path class="dep" d="M682 251 V315"/><text class="label" x="693" y="286">Gradle conventions</text>
  <path class="dep" d="M1124 251 V315"/><text class="label" x="1135" y="286">externalized config</text>
  <path class="dep" d="M470 427 H615"/><text class="label" x="505" y="419">gateway routes</text>
  <path class="dep" d="M470 442 C780 305 1120 320 1250 410"/><text class="label" x="845" y="322">routes workflow/AI</text>

  <path class="dep" d="M345 550 V740"/><text class="label" x="356" y="705">common-web/security</text>
  <path class="dep" d="M890 550 V740"/><text class="label" x="902" y="705">common-web/jpa/security/events/clients</text>
  <path class="dep" d="M1328 550 V740"/><text class="label" x="1218" y="705">common-web/security/clients</text>
  <path class="dep" d="M1415 850 H1515"/><text class="label" x="1435" y="842">MinIO / Mailpit / RabbitMQ</text>

  <!-- Notes instead of line clutter -->
  <rect class="noteBox" x="1225" y="930" width="280" height="62"/>
  <text x="1240" y="952" class="note">HTTP clients in code:</text>
  <text x="1240" y="970" class="small">visits -> customers/vets/auth/workflow/products</text>
  <text x="1240" y="986" class="small">reviews -> visits/billing; billing -> products</text>

  <rect class="noteBox" x="1515" y="760" width="210" height="82"/>
  <text x="1530" y="782" class="note">AMQP in code:</text>
  <text x="1530" y="800" class="small">publish: auth/customers/vets/visits</text>
  <text x="1530" y="816" class="small">reviews/billing</text>
  <text x="1530" y="832" class="small">consume: billing/visits/mailer</text>

  <rect class="noteBox" x="1515" y="858" width="210" height="64"/>
  <text x="1530" y="880" class="note">Infrastructure use:</text>
  <text x="1530" y="898" class="small">JPA services -> PostgreSQL</text>
  <text x="1530" y="914" class="small">common-clients -> Eureka</text>

  <text x="95" y="1012" class="source">Notation: folder-shaped boxes are UML packages/subsystems; dashed arrows are UML package dependencies. Repeated internal service packages are collapsed into one scanned layout to keep the diagram readable.</text>
</svg>
