<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1080" viewBox="0 0 1800 1080">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#263238"/>
    </marker>
    <style>
      .title { font: 700 26px Arial, sans-serif; fill: #102a43; }
      .source { font: 13px Arial, sans-serif; fill: #52616b; }
      .pkg-title { font: 700 14px Arial, sans-serif; fill: #102a43; }
      .pkg { font: 12px Arial, sans-serif; fill: #102a43; }
      .small { font: 11px Arial, sans-serif; fill: #334e68; }
      .note { font: 12px Arial, sans-serif; fill: #243b53; }
      .dep { stroke: #263238; stroke-width: 1.2; stroke-dasharray: 7 5; fill: none; marker-end: url(#arrow); }
      .solid { stroke: #4a5568; stroke-width: 1.05; fill: none; marker-end: url(#arrow); }
      .label { font: 11px Arial, sans-serif; fill: #102a43; paint-order: stroke; stroke: #fff; stroke-width: 3px; stroke-linejoin: round; }
      .root { fill: #ffffff; stroke: #263238; stroke-width: 1.5; }
      .support { fill: #eaf4ff; stroke: #246aa5; }
      .platform { fill: #fff2cc; stroke: #9a6700; }
      .domain { fill: #e6f4ea; stroke: #2f7d32; }
      .workflow { fill: #e0f2f1; stroke: #00796b; }
      .internal { fill: #f7f9fb; stroke: #627d98; }
      .shared { fill: #f1e8ff; stroke: #6f42c1; }
      .go { fill: #ffe5ec; stroke: #b83280; }
      .external { fill: #eeeeee; stroke: #555; }
      .noteBox { fill: #ffffff; stroke: #90a4ae; stroke-dasharray: 5 4; }
    </style>
  </defs>

  <text x="40" y="38" class="title">PCMS - Code Based UML Package Diagram</text>
  <text x="40" y="62" class="source">Based on: settings.gradle.kts, services/shared package declarations, service Gradle dependencies, GatewayRoutesConfig, ClientsConfig, Rabbit listeners, go.mod</text>

  <!-- Root package -->
  <path class="root" d="M40 95 h116 v24 h1504 v915 h-1620 z"/>
  <text x="54" y="112" class="pkg-title">petclinic-ms &lt;&lt;subsystem&gt;&gt;</text>

  <!-- Supporting repository packages -->
  <path class="support" d="M105 145 h88 v18 h240 v88 h-328 z"/>
  <text x="119" y="161" class="pkg-title">apps/web</text>
  <text x="134" y="190" class="pkg">routes</text>
  <text x="134" y="208" class="pkg">features</text>
  <text x="134" y="226" class="pkg">lib/api/generated</text>

  <path class="support" d="M505 145 h98 v18 h255 v88 h-353 z"/>
  <text x="519" y="161" class="pkg-title">build-logic</text>
  <text x="534" y="194" class="pkg">petclinic.java-conventions</text>
  <text x="534" y="214" class="pkg">petclinic.spring-boot-service</text>

  <path class="support" d="M930 145 h100 v18 h285 v88 h-385 z"/>
  <text x="944" y="161" class="pkg-title">config-repo</text>
  <text x="959" y="194" class="pkg">application*.yml</text>
  <text x="959" y="214" class="pkg">&lt;service&gt;*.yml</text>

  <!-- Services subsystem -->
  <path class="root" d="M95 315 h75 v22 h1215 v345 h-1290 z"/>
  <text x="109" y="332" class="pkg-title">services &lt;&lt;subsystem&gt;&gt;</text>

  <path class="platform" d="M125 365 h128 v20 h315 v165 h-443 z"/>
  <text x="139" y="381" class="pkg-title">platform services</text>
  <rect class="platform" x="150" y="410" width="150" height="34"/><text x="165" y="431" class="pkg">api-gateway</text>
  <rect class="platform" x="320" y="410" width="150" height="34"/><text x="335" y="431" class="pkg">auth-service</text>
  <rect class="platform" x="150" y="460" width="150" height="34"/><text x="165" y="481" class="pkg">config-server</text>
  <rect class="platform" x="320" y="460" width="150" height="34"/><text x="335" y="481" class="pkg">discovery-server</text>
  <rect class="platform" x="150" y="510" width="150" height="28"/><text x="165" y="529" class="pkg">admin-server</text>

