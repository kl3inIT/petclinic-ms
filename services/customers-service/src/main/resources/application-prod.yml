# Production overrides — kích hoạt bằng SPRING_PROFILES_ACTIVE=prod
spring:
  # Production KHÔNG dùng Spring Boot Docker Compose support — infra tách hẳn (k8s, terraform...).
  docker:
    compose:
      enabled: false

  jpa:
    show-sql: false
    properties:
      hibernate:
        format_sql: false                 # SQL 1 dòng — log volume thấp hơn

# Structured JSON logs (ECS format) — Loki/Elasticsearch parse trực tiếp.
logging:
  structured:
    format:
      console: ecs
  level:
    root: INFO

management:
  endpoint:
    health:
      show-details: never                 # KHÔNG lộ DB/disk detail ra ngoài
  tracing:
    sampling:
      probability: 0.1                    # 10% request — đủ cho debug, tiết kiệm storage
