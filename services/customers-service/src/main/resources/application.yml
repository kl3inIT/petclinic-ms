# Local config — chỉ giữ những gì PHẢI ở local. Còn lại sống ở config-repo/.
# Mặc định profile dev khi chạy bootRun trên máy local; CI/test override qua @ActiveProfiles,
# prod override qua env `SPRING_PROFILES_ACTIVE=prod`.

spring:
  application:
    name: customers-service

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}   # local default = dev; prod set env

  # `optional:` → app vẫn lên khi Config Server down. Prod nên đổi sang `configserver:` (no optional).
  config:
    import: optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888}

server:
  port: 8181

management:
  server:
    port: 9181
