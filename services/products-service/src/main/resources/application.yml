# Local config — chỉ giữ những gì PHẢI ở local. Còn lại sống ở config-repo/.

spring:
  application:
    name: products-service

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  config:
    import: optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888}

server:
  port: 8192                    # 8191=billing-service. Next free.

management:
  server:
    port: 9192                  # convention 9xxx — đồng nhất với các service khác.
