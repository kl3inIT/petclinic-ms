databaseChangeLog:

  # Bổ sung 3 account VET còn thiếu (vet3/vet4/vet5) cho khớp 5 vet trong
  # vets.vets catalog. Trước đó seed 006 chỉ tạo vet1 + vet2 — customer book
  # được cả 5 vet trên FE nhưng vet 3/4/5 không có account → visit orphan
  # không ai login portal xem được.
  #
  # Mật khẩu chung: "vet123" (cùng hash BCrypt với vet1/vet2 ở seed 006).
  # UUID hardcoded để idempotent re-run.
  #
  # vet3 ↔ vets.vets.id = 3 (Quân Lê)
  # vet4 ↔ vets.vets.id = 4 (Mai Phạm)
  # vet5 ↔ vets.vets.id = 5 (Hùng Vũ)

  - changeSet:
      id: 007-001-seed-dev-users-vet3-vet5
      author: mss301
      context: dev
      changes:
        - sql:
            sql: >-
              INSERT INTO auth.users (id, username, email, password, roles_csv, enabled, vet_id, customer_id) VALUES
                ('11111111-1111-1111-1111-000000000007', 'vet3', 'vet3@petclinic.local', '$2a$12$Tz9t/NL738HopUQUWG/RFeZzhuK574jdm5/rUAS09SgLCggoITT/u', 'VET', TRUE, 3, NULL),
                ('11111111-1111-1111-1111-000000000005', 'vet4', 'vet4@petclinic.local', '$2a$12$Tz9t/NL738HopUQUWG/RFeZzhuK574jdm5/rUAS09SgLCggoITT/u', 'VET', TRUE, 4, NULL),
                ('11111111-1111-1111-1111-000000000006', 'vet5', 'vet5@petclinic.local', '$2a$12$Tz9t/NL738HopUQUWG/RFeZzhuK574jdm5/rUAS09SgLCggoITT/u', 'VET', TRUE, 5, NULL)
              ON CONFLICT (username) DO NOTHING
