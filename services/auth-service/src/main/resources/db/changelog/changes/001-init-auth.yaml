databaseChangeLog:
  - changeSet:
      id: 001-create-schema-auth
      author: mss301
      changes:
        - sql:
            sql: CREATE SCHEMA IF NOT EXISTS auth
            dbms: postgresql

  - changeSet:
      id: 002-create-table-users
      author: mss301
      changes:
        - createTable:
            schemaName: auth
            tableName: users
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: username
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
                    unique: true
                    uniqueConstraintName: uk_users_username
              - column:
                  name: email
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: password
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: roles_csv
                  type: VARCHAR(255)
                  defaultValue: ""
                  constraints:
                    nullable: false
              - column:
                  name: enabled
                  type: BOOLEAN
                  defaultValueBoolean: true
                  constraints:
                    nullable: false
        - createIndex:
            schemaName: auth
            tableName: users
            indexName: idx_users_username
            unique: true
            columns:
              - column:
                  name: username
