databaseChangeLog:

  # Dev-only seed users (context: dev). Chỉ chạy khi spring.liquibase.contexts=dev
  # (auth-service-dev.yml). Test profile + prod KHÔNG chạy.
  #
  # Mục tiêu: cấp tài khoản test cho Vet portal + admin tooling — dev mới clone repo
  # khỏi phải tự register + admin link tay.
  #
  # Mật khẩu chung: "vet123" (BCrypt 12 rounds, generated bằng Spring's
  # BCryptPasswordEncoder — verify pass).
  #
  # UUID hardcoded để idempotent re-run (preCondition skip nếu đã tồn tại).
  #
  # vet1 ↔ vets.vets.id = 1 (Thanh Nguyễn, seed ở vets-service changeset 006).
  # vet2 ↔ vets.vets.id = 2 (Hương Trần). Đủ test "vet này chỉ thấy schedule của
  # chính mình" qua /me/work-schedule.

  - changeSet:
      id: 006-002-seed-dev-users-upsert
      author: mss301
      context: dev
      changes:
        # ON CONFLICT DO NOTHING — idempotent. Trước đây dùng preCondition
        # `SELECT COUNT = 0` thì bị skip toàn bộ nếu môi trường đã có 1 trong
        # 4 username (vd admin1 tạo tay). Bỏ preCondition + dùng ON CONFLICT
        # ở từng row → user còn thiếu vẫn được seed, user đã có thì pass.
        - sql:
            sql: >-
              INSERT INTO auth.users (id, username, email, password, roles_csv, enabled, vet_id, customer_id) VALUES
                ('11111111-1111-1111-1111-000000000001', 'vet1',    'vet1@petclinic.local',    '$2a$12$Tz9t/NL738HopUQUWG/RFeZzhuK574jdm5/rUAS09SgLCggoITT/u', 'VET',   TRUE, 1, NULL),
                ('11111111-1111-1111-1111-000000000002', 'vet2',    'vet2@petclinic.local',    '$2a$12$Tz9t/NL738HopUQUWG/RFeZzhuK574jdm5/rUAS09SgLCggoITT/u', 'VET',   TRUE, 2, NULL),
                ('11111111-1111-1111-1111-000000000003', 'admin1',  'admin1@petclinic.local',  '$2a$12$Tz9t/NL738HopUQUWG/RFeZzhuK574jdm5/rUAS09SgLCggoITT/u', 'ADMIN', TRUE, NULL, NULL),
                ('11111111-1111-1111-1111-000000000004', 'staff1',  'staff1@petclinic.local',  '$2a$12$Tz9t/NL738HopUQUWG/RFeZzhuK574jdm5/rUAS09SgLCggoITT/u', 'STAFF', TRUE, NULL, NULL)
              ON CONFLICT (username) DO NOTHING
