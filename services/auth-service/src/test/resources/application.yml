# Test overrides — auth-service tests.
# auth-service là JWT ISSUER (tự sinh RSA keypair in-memory), KHÔNG cần jwk-set-uri
# theo common-security pattern. Tuy nhiên common-security auto-config vẫn yêu cầu
# property tồn tại — dummy value để bean wiring pass.

spring:
  profiles:
    active: test

  docker:
    compose:
      enabled: false

  cloud:
    config:
      enabled: false
      import-check:
        enabled: false

  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yaml
    # Loại trừ context "dev" → seed users (changeset 006) skip trong test.
    # IT tự register user nếu cần, KHÔNG dùng seed data.
    contexts: test

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: auth
    open-in-view: false

petclinic:
  auth:
    jwt:
      jwk-set-uri: http://localhost:0/dummy-jwks-for-test.json
      issuer: petclinic-test
      audience: petclinic-test
    access-token-ttl: PT15M
    refresh-token-ttl: P7D
  security:
    endpoints:
      public-endpoints:
        - { method: POST, path: /api/v1/auth/register }
        - { method: POST, path: /api/v1/auth/login }
        - { method: POST, path: /api/v1/auth/refresh }
        - { method: GET, path: /.well-known/jwks.json }
      user-endpoints:
        - { method: GET, path: /api/v1/auth/me }
        - { method: POST, path: /api/v1/auth/logout }
      admin-endpoints:
        - { method: GET, path: /api/v1/admin/users/** }
        - { method: GET, path: /api/v1/admin/audit/** }
        - { method: PATCH, path: /api/v1/users/*/customer-link }
        - { method: PATCH, path: /api/v1/users/*/vet-link }

# Disable event publishing trong test (auth emit user.registered event).
petclinic.events.enabled: false

eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false
