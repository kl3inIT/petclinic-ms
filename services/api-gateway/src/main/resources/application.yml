# Local config — như mọi service khác, chỉ giữ bare minimum. Routes + filters ở config-repo/.

spring:
  application:
    name: api-gateway

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  config:
    import: optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888}

server:
  port: 8180                              # public entry point

management:
  server:
    port: 9080
