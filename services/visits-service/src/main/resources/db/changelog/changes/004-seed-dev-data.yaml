databaseChangeLog:

  # Seed 15 visits đa dạng status. Idempotent.
  # customer_user_id dùng UUID từ auth.users (đã seed: datph, admin, admintest, datph123).
  # KHÔNG FK sang auth schema — cross-service nên hardcode UUID OK.
  # pet_id 1-20 + vet_id 1-5 → cần customers-service + vets-service seed chạy trước
  # (nhưng Liquibase mỗi service chạy độc lập, nên seed này chỉ fail nếu visits DB
  # chạy trước customers/vets — không xảy ra trong compose vì service start cùng lúc).

  - changeSet:
      id: 004-seed-visits
      author: mss301
      preConditions:
        - onFail: MARK_RAN
        - sqlCheck:
            expectedResult: 0
            sql: SELECT COUNT(*) FROM visits.visits
      changes:
