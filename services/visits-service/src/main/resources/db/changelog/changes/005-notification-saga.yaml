databaseChangeLog:
  # Saga choreography state — track 1 saga instance per VisitCompletedEvent.
  # Flow:
  #   visits emit VisitCompletedEvent → create saga PENDING
  #   mailer emit VisitNotifiedEvent OR VisitNotificationFailedEvent
  #   visits SagaHandler updates: NOTIFIED (success) or COMPENSATED (compensation triggered)
  #
  # unique(event_id): idempotency — mailer có thể redeliver event, saga handler chỉ apply 1 lần.
  - changeSet:
      id: 005-create-notification-sagas
      author: petclinic-ms
      validCheckSum: 9:3118f8791ed8011f4ba4fe40452164ee
      changes:
        - createTable:
            schemaName: visits
            tableName: notification_sagas
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints: { primaryKey: true, nullable: false }
              - column:
                  name: event_id
                  type: UUID
                  constraints: { nullable: false, unique: true }
              - column:
                  name: visit_id
                  type: BIGINT
                  constraints: { nullable: false }
              - column:
                  name: saga_type
                  type: VARCHAR(40)
                  constraints: { nullable: false }
              - column:
                  name: status
                  type: VARCHAR(20)
                  constraints: { nullable: false }
              - column:
                  name: attempts
                  type: INT
                  defaultValue: 0
                  constraints: { nullable: false }
              - column:
                  name: last_error
                  type: TEXT
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: NOW()
                  constraints: { nullable: false }
              - column:
                  name: updated_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: NOW()
                  constraints: { nullable: false }
        - createIndex:
            schemaName: visits
            tableName: notification_sagas
            indexName: idx_notification_saga_visit
            columns:
              - column: { name: visit_id }
        - createIndex:
            schemaName: visits
            tableName: notification_sagas
            indexName: idx_notification_saga_status
            columns:
              - column: { name: status }

  - changeSet:
      id: 005-002-move-notification-sagas-to-visits-schema
      author: mss301
      changes:
        - sql:
            dbms: postgresql
            splitStatements: false
            sql: >-
              DO $$
              BEGIN
                IF to_regclass('visits.notification_sagas') IS NULL
                   AND to_regclass('public.notification_sagas') IS NOT NULL THEN
                  ALTER TABLE public.notification_sagas SET SCHEMA visits;
                END IF;
              END $$;
