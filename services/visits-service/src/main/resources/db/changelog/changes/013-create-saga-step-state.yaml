databaseChangeLog:
  - changeSet:
      id: 013-create-visit-completion-sagas
      author: petclinic-ms
      changes:
        - createTable:
            schemaName: visits
            tableName: visit_completion_sagas
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints: { primaryKey: true, nullable: false }
              - column:
                  name: event_id
                  type: UUID
                  constraints: { nullable: false, unique: true }
              - column:
                  name: visit_id
                  type: BIGINT
                  constraints: { nullable: false }
              - column:
                  name: status
                  type: VARCHAR(20)
                  constraints: { nullable: false }
              - column:
                  name: billing_status
                  type: VARCHAR(20)
                  constraints: { nullable: false }
              - column:
                  name: notification_status
                  type: VARCHAR(20)
                  constraints: { nullable: false }
              - column:
                  name: billing_attempts
                  type: INT
                  defaultValueNumeric: 0
                  constraints: { nullable: false }
              - column:
                  name: notification_attempts
                  type: INT
                  defaultValueNumeric: 0
                  constraints: { nullable: false }
              - column:
                  name: last_billing_error
                  type: TEXT
              - column:
                  name: last_notification_error
                  type: TEXT
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: NOW()
                  constraints: { nullable: false }
              - column:
                  name: updated_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: NOW()
                  constraints: { nullable: false }
        - createIndex:
            schemaName: visits
            tableName: visit_completion_sagas
            indexName: idx_visit_completion_saga_visit
            columns:
              - column: { name: visit_id }
        - createIndex:
            schemaName: visits
            tableName: visit_completion_sagas
            indexName: idx_visit_completion_saga_status
            columns:
              - column: { name: status }
        - createIndex:
            schemaName: visits
            tableName: visit_completion_sagas
            indexName: idx_visit_completion_saga_billing_status
            columns:
              - column: { name: billing_status }
        - createIndex:
            schemaName: visits
            tableName: visit_completion_sagas
            indexName: idx_visit_completion_saga_notification_status
            columns:
              - column: { name: notification_status }

  - changeSet:
      id: 013-create-prescription-billing-sagas
      author: petclinic-ms
      changes:
        - createTable:
            schemaName: visits
            tableName: prescription_billing_sagas
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints: { primaryKey: true, nullable: false }
              - column:
                  name: event_id
                  type: UUID
                  constraints: { nullable: false, unique: true }
              - column:
                  name: prescription_id
                  type: BIGINT
                  constraints: { nullable: false }
              - column:
                  name: visit_id
                  type: BIGINT
                  constraints: { nullable: false }
              - column:
                  name: status
                  type: VARCHAR(20)
                  constraints: { nullable: false }
              - column:
                  name: attempts
                  type: INT
                  defaultValueNumeric: 0
                  constraints: { nullable: false }
              - column:
                  name: last_error
                  type: TEXT
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: NOW()
                  constraints: { nullable: false }
              - column:
                  name: updated_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: NOW()
                  constraints: { nullable: false }
        - createIndex:
            schemaName: visits
            tableName: prescription_billing_sagas
            indexName: idx_prescription_billing_saga_prescription
            columns:
              - column: { name: prescription_id }
        - createIndex:
            schemaName: visits
            tableName: prescription_billing_sagas
            indexName: idx_prescription_billing_saga_visit
            columns:
              - column: { name: visit_id }
        - createIndex:
            schemaName: visits
            tableName: prescription_billing_sagas
            indexName: idx_prescription_billing_saga_status
            columns:
              - column: { name: status }
