spring:
  application:
    name: genai-service

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # Exclude phải nằm trong jar — config-server property source load SAU autoconfig phase
  # ở Spring Boot 4. Để config-server thì OpenAiEmbeddingAutoConfiguration vẫn fire.
  autoconfigure:
    exclude:
      - org.springframework.ai.model.openai.autoconfigure.OpenAiEmbeddingAutoConfiguration

  config:
    import: optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888}

server:
  port: 8188                    # 8187=mcp-server. Next free.

management:
  server:
    port: 9188
