databaseChangeLog:
  # Workflow duyệt thay đổi: vet submit photo / education → status=PENDING.
  # Staff/Admin approve hoặc reject. Customer chỉ thấy APPROVED.
  # Data hiện có default APPROVED để không block hiển thị tức thì.
  #
  # status enum: PENDING | APPROVED | REJECTED (CHECK constraint)
  - changeSet:
      id: 013-001-add-status-vet-photo
      author: mss301
      changes:
        - addColumn:
            schemaName: vets
            tableName: vet_photo
            columns:
              - column:
                  name: status
                  type: VARCHAR(20)
                  defaultValue: APPROVED
                  constraints:
                    nullable: false
              - column:
                  name: reviewed_by
                  type: VARCHAR(50)
              - column:
                  name: reviewed_at
                  type: TIMESTAMP WITH TIME ZONE
              - column:
                  name: reject_reason
                  type: TEXT
        - sql:
            sql: >-
              ALTER TABLE vets.vet_photo
              ADD CONSTRAINT ck_vet_photo_status
              CHECK (status IN ('PENDING','APPROVED','REJECTED'))

  - changeSet:
      id: 013-002-add-status-educations
      author: mss301
      changes:
        - addColumn:
            schemaName: vets
            tableName: educations
            columns:
              - column:
                  name: status
                  type: VARCHAR(20)
                  defaultValue: APPROVED
                  constraints:
                    nullable: false
              - column:
                  name: reviewed_by
                  type: VARCHAR(50)
              - column:
                  name: reviewed_at
                  type: TIMESTAMP WITH TIME ZONE
              - column:
                  name: reject_reason
                  type: TEXT
        - sql:
            sql: >-
              ALTER TABLE vets.educations
              ADD CONSTRAINT ck_educations_status
              CHECK (status IN ('PENDING','APPROVED','REJECTED'))

        # Index hỗ trợ query "list all PENDING across vets" cho admin dashboard.
        - createIndex:
            schemaName: vets
            tableName: educations
            indexName: idx_educations_status
            columns:
              - column:
                  name: status
