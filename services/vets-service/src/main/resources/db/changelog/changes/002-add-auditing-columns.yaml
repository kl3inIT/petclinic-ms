databaseChangeLog:

  - changeSet:
      id: 002-001-add-audit-columns-vets
      author: mss301
      changes:
        - addColumn:
            schemaName: vets
            tableName: vets
            columns:
              - column: { name: created_by,         type: VARCHAR(50) }
              - column: { name: created_date,       type: TIMESTAMP WITH TIME ZONE }
              - column: { name: last_modified_by,   type: VARCHAR(50) }
              - column: { name: last_modified_date, type: TIMESTAMP WITH TIME ZONE }

  - changeSet:
      id: 002-002-add-audit-columns-specialties
      author: mss301
      changes:
        - addColumn:
            schemaName: vets
            tableName: specialties
            columns:
              - column: { name: created_by,         type: VARCHAR(50) }
              - column: { name: created_date,       type: TIMESTAMP WITH TIME ZONE }
              - column: { name: last_modified_by,   type: VARCHAR(50) }
              - column: { name: last_modified_date, type: TIMESTAMP WITH TIME ZONE }
              # Update lại các specialty đã seed → tránh @CreatedBy NOT NULL fail nếu sau này thêm constraint
        - update:
            schemaName: vets
            tableName: specialties
            columns:
              - column: { name: created_by, value: "system" }
              - column: { name: created_date, valueComputed: "NOW()" }
              - column: { name: last_modified_by, value: "system" }
              - column: { name: last_modified_date, valueComputed: "NOW()" }
