databaseChangeLog:

  # Phase E2 — Photo (1-1 avatar) + AlbumPhoto (1-N gallery).
  # BINARY KHÔNG lưu Postgres — chỉ metadata. Object thật ở MinIO bucket `avatars`
  # với key pattern:
  #   vets/photo/<vetId>          (avatar, overwrite khi update)
  #   vets/album/<vetId>/<photoId>  (album item)
  # FK CASCADE: xoá vet → xoá metadata. MinIO object phải xoá thủ công ở
  # listener/cleanup job (tránh orphan); KHÔNG block CASCADE để giữ DELETE vet idempotent.

  - changeSet:
      id: 009-001-create-table-vet-photo
      author: mss301
      changes:
        - createTable:
            schemaName: vets
            tableName: vet_photo
            columns:
              - column:
                  name: vet_id
                  type: BIGINT
                  constraints:
                    primaryKey: true
                    nullable: false
                    foreignKeyName: fk_vet_photo_vet
                    references: vets.vets(id)
                    deleteCascade: true
              - column:
                  name: object_key
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: content_type
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: size_bytes
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: uploaded_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: NOW()
                  constraints:
                    nullable: false
              # Audit columns — AbstractAuditingEntity fill qua Spring Data Auditing
              - column: { name: created_by,         type: VARCHAR(50) }
              - column: { name: created_date,       type: TIMESTAMP WITH TIME ZONE }
              - column: { name: last_modified_by,   type: VARCHAR(50) }
              - column: { name: last_modified_date, type: TIMESTAMP WITH TIME ZONE }

  - changeSet:
      id: 009-002-create-table-vet-album-photos
      author: mss301
      changes:
        - createTable:
            schemaName: vets
            tableName: vet_album_photos
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: vet_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_vet_album_photos_vet
                    references: vets.vets(id)
                    deleteCascade: true
              - column: { name: caption,      type: VARCHAR(255) }
              - column:
                  name: object_key
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: content_type
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: size_bytes
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: uploaded_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: NOW()
                  constraints:
                    nullable: false
              # Audit columns
              - column: { name: created_by,         type: VARCHAR(50) }
              - column: { name: created_date,       type: TIMESTAMP WITH TIME ZONE }
              - column: { name: last_modified_by,   type: VARCHAR(50) }
              - column: { name: last_modified_date, type: TIMESTAMP WITH TIME ZONE }

  - changeSet:
      id: 009-003-index-vet-album-photos-vet-id
      author: mss301
      changes:
        - createIndex:
            schemaName: vets
            tableName: vet_album_photos
            indexName: idx_vet_album_photos_vet_id
            columns:
              - column: { name: vet_id }
