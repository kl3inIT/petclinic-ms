spring:
  application:
    name: workflow-service

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  config:
    import: optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888}

server:
  port: 8189                    # 8185=admin-server, 8186=mailer (Go), 8187=mcp-server, 8188=genai.

management:
  server:
    port: 9189                  # convention 9xxx — đồng nhất với các service khác.
