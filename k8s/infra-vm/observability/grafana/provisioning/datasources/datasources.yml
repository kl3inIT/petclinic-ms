apiVersion: 1

datasources:
  - name: Prometheus
    uid: prometheus
    type: prometheus
    access: proxy
    url: http://petclinic-prometheus:9090
    isDefault: true
    jsonData: { timeInterval: 30s }

  - name: Loki
    uid: loki
    type: loki
    access: proxy
    url: http://petclinic-loki:3100
    jsonData:
      maxLines: 1000
      # Click a log line's traceId -> jump to the trace in Tempo.
      derivedFields:
        - name: traceID
          matcherRegex: "\"trace(?:Id|ID|_id)\":\"?([A-Fa-f0-9]{16,32})\"?"
          datasourceUid: tempo
          url: "$${__value.raw}"

  - name: Tempo
    uid: tempo
    type: tempo
    access: proxy
    url: http://petclinic-tempo:3200
    jsonData:
      tracesToLogsV2: { datasourceUid: loki, filterByTraceID: true }
      serviceMap: { datasourceUid: prometheus }
