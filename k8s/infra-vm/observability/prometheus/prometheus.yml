# PCMS Prometheus (Observability VM).
# App metrics arrive via REMOTE-WRITE from the in-cluster Alloy DaemonSet
# (services run in GKE, not here) — so there are no static app scrape jobs.
# Enable the receiver with --web.enable-remote-write-receiver (set in compose).
# Here we only scrape the observability components and the Data-VM exporters.
global:
  scrape_interval: 30s
  scrape_timeout: 10s
  evaluation_interval: 30s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["petclinic-prometheus:9090"]
  - job_name: grafana
    static_configs:
      - targets: ["petclinic-grafana:3000"]
  - job_name: loki
    static_configs:
      - targets: ["petclinic-loki:3100"]
  - job_name: tempo
    static_configs:
      - targets: ["petclinic-tempo:3200"]
  - job_name: alloy-gateway
    static_configs:
      - targets: ["petclinic-alloy-gw:12345"]

  # Data-VM backends (exporters run on this Obs VM, pointed at the Data VM).
  - job_name: postgres
    static_configs:
      - targets: ["petclinic-postgres-exporter:9187"]
        labels: { application: postgres }
  - job_name: redis
    static_configs:
      - targets: ["petclinic-redis-exporter:9121"]
        labels: { application: redis }
