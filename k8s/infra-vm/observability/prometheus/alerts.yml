groups:
  - name: petclinic-basic
    rules:
      - alert: ServiceDown
        expr: up == 0
        for: 2m
        labels: { severity: critical }
        annotations:
          summary: "Target {{ $labels.job }} ({{ $labels.application }}) is down"

      - alert: HighJvmHeapUsage
        expr: sum by (application) (jvm_memory_used_bytes{area="heap"}) / sum by (application) (jvm_memory_max_bytes{area="heap"}) > 0.9
        for: 5m
        labels: { severity: warning }
        annotations:
          summary: "JVM heap >90% on {{ $labels.application }}"

      - alert: HighHttpErrorRate
        expr: sum by (application) (rate(http_server_requests_seconds_count{status=~"5.."}[5m])) > 1
        for: 5m
        labels: { severity: warning }
        annotations:
          summary: "5xx error rate elevated on {{ $labels.application }}"
