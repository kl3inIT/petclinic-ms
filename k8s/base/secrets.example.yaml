# Example only — DO NOT commit real values. Copy to secrets.yaml, fill in, and
# keep secrets.yaml out of git (already covered by k8s/.gitignore). Or create
# from CLI:
#   kubectl -n petclinic create secret generic petclinic-secrets \
#     --from-literal=DB_PASSWORD=... --from-literal=ADMIN_PASSWORD=... \
#     --from-literal=PETCLINIC_LLM_API_KEY=... --from-literal=PETCLINIC_EMBEDDING_API_KEY=... \
#     --from-literal=PETCLINIC_CRYPTO_KEY=...
apiVersion: v1
kind: Secret
metadata:
  name: petclinic-secrets
type: Opaque
stringData:
  DB_PASSWORD: "CHANGE_ME"
  ADMIN_PASSWORD: "CHANGE_ME"
  PETCLINIC_LLM_API_KEY: "CHANGE_ME"
  PETCLINIC_EMBEDDING_API_KEY: "CHANGE_ME"
  PETCLINIC_CRYPTO_KEY: "CHANGE_ME_32_BYTE_BASE64"
  MINIO_ACCESS_KEY: "minioadmin"
  MINIO_SECRET_KEY: "CHANGE_ME"
