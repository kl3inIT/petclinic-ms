name: CI

# Workflow tối thiểu để:
#  1. Verify gradle build trên mỗi push/PR vào main.
#  2. Cho Dependabot `github-actions` ecosystem có manifest để scan
#     (actions/checkout, actions/setup-java, gradle/actions/setup-gradle).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Gradle build (JDK 25)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Build
        run: ./gradlew --no-daemon build
