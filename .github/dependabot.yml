# Dependabot — auto PR khi có dependency update.
# open-pull-requests-limit cao (99) = effectively unlimited.
# Schedule daily để nhận update sớm; có thể đổi sang `weekly` nếu PR nhiều quá.

version: 2

updates:
  # ─────────────────────────────────────────────────────────
  # Gradle — version catalog ở gradle/libs.versions.toml, plus
  # build script ở root, mỗi service, và included build build-logic/
  # ─────────────────────────────────────────────────────────

  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 99
    labels:
      - "dependencies"
      - "gradle"
    commit-message:
      prefix: "deps"
      include: "scope"
    groups:
      spring:
        patterns:
          - "org.springframework*:*"
          - "org.springdoc:*"
          - "io.micrometer:*"
      testing:
        patterns:
          - "org.junit*:*"
          - "org.testcontainers:*"
          - "org.mockito:*"
      database:
        patterns:
          - "org.postgresql:*"
          - "org.liquibase:*"
          - "com.h2database:*"

  # build-logic là included build dùng CHUNG version catalog ở root
  # (`from(files("../gradle/libs.versions.toml"))`). Không khai báo entry
  # riêng cho /build-logic vì Dependabot sandbox không resolve được path `..`
  # → "The updater encountered one or more errors". Update plugin version
  # (spring-boot-gradle-plugin, spring-dep-management-plugin) đã được entry
  # root xử lý qua libs.versions.toml.

  # ─────────────────────────────────────────────────────────
  # Docker — compose.yaml ở root (Postgres image)
  # ─────────────────────────────────────────────────────────

  - package-ecosystem: "docker-compose"
    directory: "/"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 99
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "deps(docker)"

  # ─────────────────────────────────────────────────────────
  # npm / pnpm workspace — root package.json + apps/web package.json
  # ─────────────────────────────────────────────────────────

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 99
    labels:
      - "dependencies"
      - "frontend"
    commit-message:
      prefix: "deps(npm)"
    groups:
      frontend-runtime:
        patterns:
          - "react"
          - "react-dom"
          - "@tanstack/*"
          - "@radix-ui/*"
          - "radix-ui"
          - "axios"
          - "zod"
      frontend-tooling:
        patterns:
          - "vite"
          - "vitest"
          - "@vitejs/*"
          - "typescript"
          - "typescript-eslint"
          - "eslint*"
          - "@eslint/*"
          - "prettier*"
          - "orval"
          - "@playwright/*"

  - package-ecosystem: "npm"
    directory: "/apps/web"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 99
    labels:
      - "dependencies"
      - "frontend"
    commit-message:
      prefix: "deps(web)"
    groups:
      web-runtime:
        patterns:
          - "*"

  # ─────────────────────────────────────────────────────────
  # Go modules — mailer-service
  # ─────────────────────────────────────────────────────────

  - package-ecosystem: "gomod"
    directory: "/services/mailer-service"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 99
    labels:
      - "dependencies"
      - "go"
    commit-message:
      prefix: "deps(go)"

  # ─────────────────────────────────────────────────────────
  # GitHub Actions — scan các action ref trong .github/workflows/.
  # ─────────────────────────────────────────────────────────

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 99
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "deps(actions)"
