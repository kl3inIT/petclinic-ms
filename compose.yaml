# Dev infrastructure cho petclinic-ms.
# Spring Boot Docker Compose support tự start/stop khi bootRun.
#
# Chạy thủ công:
#   docker compose --profile all up -d         # tất cả infra
#   docker compose --profile db up -d          # chỉ Postgres
#   docker compose --profile db --profile mq up -d   # Postgres + RabbitMQ
#
# Lưu ý: service không có profile sẽ chạy mỗi lần `docker compose up` không filter,
# nên mọi infra đều gán profile để dev chủ động chọn.

services:

  postgres:
    image: postgres:18-alpine
    container_name: petclinic-postgres
    profiles: ["db", "all"]
    environment:
      POSTGRES_DB: petclinic
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --locale-provider=icu --icu-locale=en"
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d petclinic"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    labels:
      org.springframework.boot.service-connection: postgres

  # Message broker — fanout VisitCompleted → billing + mailer, DLQ retry.
  # Mgmt UI: http://localhost:15672  (guest/guest)
  rabbitmq:
    image: rabbitmq:4-management-alpine
    container_name: petclinic-rabbitmq
    profiles: ["mq", "all"]
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"      # AMQP
      - "15672:15672"    # Mgmt UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped
    labels:
      org.springframework.boot.service-connection: rabbit

  # Cache + rate limit + refresh-token blacklist.
  redis:
    image: redis:8-alpine
    container_name: petclinic-redis
    profiles: ["cache", "all"]
    ports:
      - "6380:6379"      # host:6380 → container:6379 (6379 host bị Redis khác chiếm)
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    labels:
      org.springframework.boot.service-connection: redis

  # Dev SMTP — bắt mọi mail outbound + xem trong UI, không gửi thật.
  # UI: http://localhost:8025
  mailpit:
    image: axllent/mailpit:latest
    container_name: petclinic-mailpit
    profiles: ["mail", "all"]
    ports:
      - "1025:1025"      # SMTP
      - "8025:8025"      # Web UI
    environment:
      MP_MAX_MESSAGES: 5000
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    restart: unless-stopped

  # S3-compatible object storage — pet photos, invoice PDF, avatar.
  # Console: http://localhost:9001  (minioadmin/minioadmin)
  minio:
    image: minio/minio:latest
    container_name: petclinic-minio
    profiles: ["storage", "all"]
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"      # S3 API
      - "9001:9001"      # Console
    volumes:
      - minio_data:/data
    command: ["server", "/data", "--console-address", ":9001"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  # Tạo bucket mặc định lúc init, exit ngay sau khi xong.
  minio-init:
    image: minio/mc:latest
    container_name: petclinic-minio-init
    profiles: ["storage", "all"]
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/pet-photos;
      mc mb --ignore-existing local/invoices;
      mc mb --ignore-existing local/avatars;
      mc anonymous set download local/pet-photos;
      mc anonymous set download local/avatars;
      exit 0;
      "
    restart: "no"

  # =================================================================
  # Spring services — profile "apps" — build từ root Dockerfile + ARG SERVICE.
  #
  #   docker compose --profile all --profile apps up -d --build
  #
  # Thứ tự khởi động ràng buộc qua depends_on:
  #   config-server → discovery-server → (auth, customers, vets, visits, admin) → api-gateway
  #
  # Mailer-service đã có Dockerfile riêng (Go) → giữ profile cũ, chỉ thêm depends_on lên rabbitmq.
  # =================================================================

  config-server:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: config-server
    image: petclinic-ms/config-server:latest
    container_name: petclinic-config-server
    profiles: ["apps"]
    ports:
      - "8888:8888"
      - "9888:9888"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      # Spring Boot Docker Compose Support phải tắt khi chạy TRONG container — sẽ vô hạn lồng.
      SPRING_DOCKER_COMPOSE_ENABLED: "false"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9888/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    restart: unless-stopped

  discovery-server:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: discovery-server
    image: petclinic-ms/discovery-server:latest
    container_name: petclinic-discovery-server
    profiles: ["apps"]
    ports:
      - "8761:8761"
      - "9761:9761"
    depends_on:
      config-server:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DOCKER_COMPOSE_ENABLED: "false"
      CONFIG_SERVER_URL: http://config-server:8888
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9761/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    restart: unless-stopped

  auth-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: auth-service
    image: petclinic-ms/auth-service:latest
    container_name: petclinic-auth-service
    profiles: ["apps"]
    ports:
      - "8183:8183"
      - "9183:9183"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DOCKER_COMPOSE_ENABLED: "false"
      CONFIG_SERVER_URL: http://config-server:8888
      EUREKA_URL: http://discovery-server:8761/eureka/
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/petclinic
      SPRING_RABBITMQ_HOST: rabbitmq
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9183/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 45s
    restart: unless-stopped

  customers-service:
    build: { context: ., dockerfile: Dockerfile, args: { SERVICE: customers-service } }
    image: petclinic-ms/customers-service:latest
    container_name: petclinic-customers-service
    profiles: ["apps"]
    ports:
      - "8181:8181"
      - "9181:9181"
    depends_on:
      postgres: { condition: service_healthy }
      config-server: { condition: service_healthy }
      discovery-server: { condition: service_healthy }
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DOCKER_COMPOSE_ENABLED: "false"
      CONFIG_SERVER_URL: http://config-server:8888
      EUREKA_URL: http://discovery-server:8761/eureka/
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/petclinic
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9181/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 45s
    restart: unless-stopped

  vets-service:
    build: { context: ., dockerfile: Dockerfile, args: { SERVICE: vets-service } }
    image: petclinic-ms/vets-service:latest
    container_name: petclinic-vets-service
    profiles: ["apps"]
    ports:
      - "8182:8182"
      - "9182:9182"
    depends_on:
      postgres: { condition: service_healthy }
      config-server: { condition: service_healthy }
      discovery-server: { condition: service_healthy }
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DOCKER_COMPOSE_ENABLED: "false"
      CONFIG_SERVER_URL: http://config-server:8888
      EUREKA_URL: http://discovery-server:8761/eureka/
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/petclinic
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9182/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 45s
    restart: unless-stopped

  visits-service:
    build: { context: ., dockerfile: Dockerfile, args: { SERVICE: visits-service } }
    image: petclinic-ms/visits-service:latest
    container_name: petclinic-visits-service
    profiles: ["apps"]
    ports:
      - "8184:8184"
      - "9184:9184"
    depends_on:
      postgres: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
      config-server: { condition: service_healthy }
      discovery-server: { condition: service_healthy }
      customers-service: { condition: service_healthy }
      vets-service: { condition: service_healthy }
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DOCKER_COMPOSE_ENABLED: "false"
      CONFIG_SERVER_URL: http://config-server:8888
      EUREKA_URL: http://discovery-server:8761/eureka/
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/petclinic
      SPRING_RABBITMQ_HOST: rabbitmq
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9184/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 45s
    restart: unless-stopped

  api-gateway:
    build: { context: ., dockerfile: Dockerfile, args: { SERVICE: api-gateway } }
    image: petclinic-ms/api-gateway:latest
    container_name: petclinic-api-gateway
    profiles: ["apps"]
    ports:
      - "8180:8180"
      - "9080:9080"
    depends_on:
      auth-service: { condition: service_healthy }
      customers-service: { condition: service_healthy }
      vets-service: { condition: service_healthy }
      visits-service: { condition: service_healthy }
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DOCKER_COMPOSE_ENABLED: "false"
      CONFIG_SERVER_URL: http://config-server:8888
      EUREKA_URL: http://discovery-server:8761/eureka/
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 45s
    restart: unless-stopped

  admin-server:
    build: { context: ., dockerfile: Dockerfile, args: { SERVICE: admin-server } }
    image: petclinic-ms/admin-server:latest
    container_name: petclinic-admin-server
    profiles: ["apps"]
    ports:
      - "8185:8185"
      - "9185:9185"
    depends_on:
      config-server: { condition: service_healthy }
      discovery-server: { condition: service_healthy }
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DOCKER_COMPOSE_ENABLED: "false"
      CONFIG_SERVER_URL: http://config-server:8888
      EUREKA_URL: http://discovery-server:8761/eureka/
      ADMIN_USER: admin
      ADMIN_PASSWORD: admin
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9185/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 45s
    restart: unless-stopped

  # Mailer (Go) — đã có Dockerfile riêng tại services/mailer-service/.
  # Kéo lên profile "apps" để full-stack `--profile all --profile apps up` cover luôn.
  mailer-service:
    build:
      context: ./services/mailer-service
      dockerfile: Dockerfile
    image: petclinic-ms/mailer-service:latest
    container_name: petclinic-mailer-service
    profiles: ["apps"]
    ports:
      - "8186:8186"
    depends_on:
      rabbitmq: { condition: service_healthy }
      redis: { condition: service_healthy }
      mailpit: { condition: service_started }
      admin-server: { condition: service_healthy }
    environment:
      AMQP_URL: amqp://guest:guest@rabbitmq:5672/
      REDIS_ADDR: redis:6379
      SMTP_HOST: mailpit
      SMTP_PORT: "1025"
      ADMIN_SERVER_URL: http://admin-server:8185
      ADMIN_PUBLIC_HOST: mailer-service
      ADMIN_USER: admin
      ADMIN_PASSWORD: admin
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8186/health"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s
    restart: unless-stopped

volumes:
  postgres_data:
    name: petclinic-postgres-data
  rabbitmq_data:
    name: petclinic-rabbitmq-data
  redis_data:
    name: petclinic-redis-data
  minio_data:
    name: petclinic-minio-data
