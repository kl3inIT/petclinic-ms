# Dashboard provider — Grafana scan path mỗi 30s, load JSON file thành dashboard.
# Folder structure: /var/lib/grafana/dashboards (mount từ infra/observability/grafana/dashboards/).
apiVersion: 1

providers:
  - name: 'petclinic-dashboards'
    orgId: 1
    folder: 'PetClinic'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
