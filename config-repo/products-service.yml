# Products — env-agnostic config.
# Datasource creds + URL khác env → products-service-<profile>.yml.

spring:
  jpa:
    hibernate:
      ddl-auto: validate                  # Liquibase quản lý schema
    properties:
      hibernate:
        default_schema: products
        format_sql: true
    open-in-view: false

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
