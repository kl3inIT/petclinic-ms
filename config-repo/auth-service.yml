# Auth-service — env-agnostic config.
# Datasource creds + JWT secret theo env → auth-service-<profile>.yml.

spring:
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: auth
        format_sql: true
    open-in-view: false

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

# JWT token TTL — RS256 access (15min) + opaque refresh (7d).
# RSA keypair tự generate ở auth-service startup (in-memory, dev). Prod thay bằng PEM env.
petclinic:
  auth:
    access-token-ttl: PT15M
    refresh-token-ttl: P7D
  # RBAC — Least Privilege (slide MSS301 #70).
  security:
    endpoints:
      # Public — register/login/refresh + JWKS (clients fetch public key)
      public-endpoints:
        - { method: POST, path: /api/v1/auth/register }
        - { method: POST, path: /api/v1/auth/login }
        - { method: POST, path: /api/v1/auth/refresh }
        - { method: GET,  path: /.well-known/jwks.json }
      # USER+ — xem profile, logout
      user-endpoints:
        - { method: GET,  path: /api/v1/auth/me }
        - { method: POST, path: /api/v1/auth/logout }
      # Admin only — user management (xem audit log, list users) + Phase L link customer
      # + Phase K link vet.
      admin-endpoints:
        - { method: GET,   path: /api/v1/admin/users/** }
        - { method: GET,   path: /api/v1/admin/audit/** }
        - { method: PATCH, path: /api/v1/users/*/customer-link }
        - { method: PATCH, path: /api/v1/users/*/vet-link }
