# Vets dev.

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/petclinic?currentSchema=vets}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  # Phase G — publish vet.rating.added cần RabbitMQ.
  # Files-service dùng MinIO nên dev bật thêm `storage`.
  docker:
    compose:
      profiles:
        active: ["db", "mq", "storage"]

# Phase G — bật event publishing ở dev (test profile đã tắt qua application-test.yml).
petclinic:
  events:
    enabled: ${PETCLINIC_EVENTS_ENABLED:true}

logging:
  level:
    org.hibernate.SQL: INFO
