# Customers — env-agnostic.
# Datasource creds + URL khác env → customers-service-<profile>.yml.

spring:
  jpa:
    hibernate:
      ddl-auto: validate                  # Liquibase quản lý schema, JPA chỉ validate mapping
    properties:
      hibernate:
        default_schema: customers
        format_sql: true                  # dev đọc dễ; prod override → false
    open-in-view: false                   # 2026 best practice

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
    # tracking ở `public` schema — xem CLAUDE.md (chicken-and-egg pattern)

  # Upload ảnh pet + owner avatar. Spring mặc định max-file-size 1MB → cản ảnh 10MB.
  # Theo decision project: 10MB/file (+overhead form → 11MB request). Mirror vets-service.
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 11MB

# Binary file access goes through Go files-service. Customers only owns metadata
# (`Pet.photoId`, `Owner.avatarObjectKey`) and business validation.
#
# RBAC — Least Privilege (slide MSS301 #70). Áp bởi EndpointSecurityCustomizer.
# Customers data nhạy cảm (PII) → siết hơn vets:
#   - Mọi USER xem được pet (FE owner page hiển thị pet của mình)
#   - List owners + create/delete owner → STAFF/ADMIN (không cho self-signup tạo owner record)
petclinic:
  files:
    base-url: ${FILES_SERVICE_URL:http://localhost:8193}
    bucket: ${FILES_BUCKET:pet-photos}
    presigned-ttl: PT1H
    max-file-size-bytes: 10485760  # 10 MB
  security:
    endpoints:
      # Authenticated USER xem được catalog pet + pet types (cho dropdown FE)
      user:
        - { method: GET, path: /api/v1/pets/** }
        - { method: GET, path: /api/v1/pet-types/** }
        - { method: GET, path: /api/v1/owners/me }
        - { method: PATCH, path: /api/v1/owners/me }
        - { method: PUT, path: /api/v1/owners/me/avatar }      # upload avatar chủ nuôi
        - { method: DELETE, path: /api/v1/owners/me/avatar }   # xoá avatar chủ nuôi
        - { method: POST, path: /api/v1/owners/me/pets }
        - { method: PUT, path: /api/v1/owners/me/pets/** }     # gồm /owners/me/pets/{id}/photo
        - { method: DELETE, path: /api/v1/owners/me/pets/** }  # gồm /owners/me/pets/{id}/photo
        - { method: GET, path: /api/v1/owners/* }     # USER pass filter chain; @PreAuthorize trên controller siết per-instance ownership (chỉ xem record của mình)
      # Staff vận hành owner records — tạo, list, xem detail
      staff:
        - { method: GET,  path: /api/v1/owners }
        - { method: GET,  path: /api/v1/owners/** }   # detail + sub-resources cho STAFF
        - { method: POST, path: /api/v1/owners }
        - { method: PUT,  path: /api/v1/owners/** }
        - { method: PATCH, path: /api/v1/owners/** }
      # Admin only — hard delete + pet management (write) + pet-type catalog write
      admin:
        - { method: DELETE, path: /api/v1/owners/** }
        - { method: POST,   path: /api/v1/pets }
        - { method: PUT,    path: /api/v1/pets/** }
        - { method: PATCH,  path: /api/v1/pets/** }
        - { method: DELETE, path: /api/v1/pets/** }
        - { method: POST,   path: /api/v1/pet-types }
        - { method: PUT,    path: /api/v1/pet-types/** }
        - { method: DELETE, path: /api/v1/pet-types/** }
