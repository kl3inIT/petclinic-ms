# Dev profile — local laptop, full observability, dev convenience.

spring:
  # Tự start Postgres từ compose.yaml ở rootDir khi bootRun. Container persist (`start-only`).
  # Service dùng common-events tự bổ sung "mq" vào profile list ở <service>-dev.yml.
  docker:
    compose:
      file: compose.yaml
      profiles:
        active: ["db"]
      lifecycle-management: start-only

  # RabbitMQ default localhost:5672 / guest:guest — match compose.yaml mq profile.
  # Service không dùng common-events có thể bỏ qua (autoconfig chỉ bật khi RabbitTemplate trên classpath).
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}

management:
  endpoint:
    health:
      show-details: when-authorized       # dev OK lộ details, prod sẽ override
  tracing:
    sampling:
      probability: 1.0                    # 100% trace — debug dễ

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true

logging:
  level:
    root: INFO
    org.hibernate.SQL: INFO
    # plain text + correlation pattern (inherit từ application.yml) — màu trong console dev

# Shared JWT validation config — RSA + JWKS endpoint.
# Auth-service publishes public keys ở /.well-known/jwks.json. Mọi service (gateway/customers/vets)
# fetch + cache để verify RS256 signature. KHÔNG có shared secret — chỉ public key distribute.
petclinic:
  auth:
    jwt:
      jwk-set-uri: ${JWKS_URI:http://localhost:8183/.well-known/jwks.json}
      issuer: petclinic-ms
      audience: petclinic-ms
