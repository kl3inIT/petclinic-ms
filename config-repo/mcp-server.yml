# mcp-server — shared (env-agnostic) config.
# Env-specific override → mcp-server-<profile>.yml.

spring:
  ai:
    # ⚠️ Spring AI 2.0.0-M6 — phải TẮT mọi auto-config chat/embedding/image/audio:
    # starter spring-ai-openai (kéo qua mcp transitively) eager-create các ChatModel /
    # EmbeddingModel bean ở boot → require apiKey, không có thì boot fail. mcp-server
    # KHÔNG dùng LLM (chỉ expose tools) → disable hết, an toàn.
    model:
      chat: none
      embedding: none
      embedding.text: none
      embedding.multimodal: none
      image: none
      audio.speech: none
      audio.transcription: none
      moderation: none
    mcp:
      server:
        # SEP-1442 (Spring IO 2026 keynote): "Make MCP Stateless (by default)".
        # STATELESS protocol = Streamable HTTP không cần Mcp-Session-Id → mỗi request
        # độc lập, load balancer rải random, KHÔNG cần sticky session. Scale ngang
        # thoải mái không phải lo session affinity.
        #
        # Trade-off: KHÔNG dùng được sampling/elicitation từ server (cần persistent
        # bi-directional connection). Petclinic chỉ expose tool/resource/prompt → OK.
        protocol: STATELESS
        name: petclinic-mcp-server
        version: 0.2.0
        type: SYNC                # Sync mode — blocking + virtual threads stack toàn project
        # Annotation scanner — auto-pickup @McpTool/@McpResource/@McpPrompt beans
        # mà không cần khai báo ToolCallbackProvider thủ công (Phase 12a legacy).
        annotation-scanner:
          enabled: true
        instructions: |
          Petclinic MCP server (read-only). 3 component categories:
          - TOOLS (model-controlled): listOwners, getOwner, getPet, listVets, getVet,
            findVetsBySpecialty, searchVisits, getVisit
          - RESOURCES (application-controlled): pet-care FAQ, vet specialty catalog
          - PROMPTS (user-controlled): visit-summary template, owner-contact template

# MCP-specific properties
petclinic:
  mcp:
    # URI public của MCP server — dùng trong /.well-known/oauth-protected-resource metadata.
    # Override env override khi prod public hostname khác.
    resource-uri: ${MCP_RESOURCE_URI:http://localhost:8187/mcp}

management:
  endpoints:
    web:
      exposure:
        # Thêm mcp-related actuator endpoints khi Spring AI cung cấp (M6 chưa có chuyên dụng).
        # Đã inherit từ application.yml: health/info/metrics/prometheus/loggers/...
        include: "*"

logging:
  level:
    org.springframework.ai: DEBUG          # learning project — log mọi LLM/MCP interaction
    com.mss301.petclinic.mcp: DEBUG
