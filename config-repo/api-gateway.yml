# Gateway — env-agnostic routes + default filters.
#
# IMPORTANT: Spring Cloud Gateway 5.0.x (Boot 4 / Cloud 2025.x) đổi prefix:
#   - Cloud 4.x:  spring.cloud.gateway.mvc.*  (deprecated)
#   - Cloud 5.x:  spring.cloud.gateway.server.webmvc.*  ← dùng cái này
# Verify bằng /actuator/configprops — bean `gatewayMvcProperties` có prefix=spring.cloud.gateway.server.webmvc.
#
# Pattern: predicate `/api/v1/<resource>/**` PASSTHROUGH (KHÔNG StripPrefix) vì downstream service
# đã serve native ở /api/v1/<resource>. Khác official petclinic (họ dùng `/api/vet` + StripPrefix=2
# vì downstream serve ở root).
#
# Default filters áp cho MỌI route:
#   - CircuitBreaker → forward:/fallback nếu downstream lỗi/timeout
#   - Retry         → 1 lần với 503, chỉ POST (idempotent-safe theo Spring guidance)

spring:
  cloud:
    gateway:
      server:
        webmvc:
          enabled: true                   # explicit — đảm bảo gateway MVC autoconfig active

# Routes định nghĩa qua @Bean RouterFunction trong GatewayRoutesConfig.java (functional API —
# canonical cho WebMVC variant). Lý do KHÔNG dùng YAML `spring.cloud.gateway.server.webmvc.routes`:
# YAML hỗ trợ predicates/uri OK nhưng filter shortcut `CircuitBreaker=...` không wire đúng trong
# 5.0.x. Functional builder gói CB filter trực tiếp vào HandlerFilterFunction chain.

# CircuitBreaker config — Resilience4j servlet stack (KHÔNG phải reactor).
# Mở circuit khi 50% requests trong 10 lần gần nhất fail; mở 5s → half-open thử 3 request.
# OpenAPI aggregation — Swagger UI tại http://localhost:8180/swagger-ui.html
# Dropdown chọn được spec của 4 service. Mỗi URL trỏ vào /v3/api-docs/{service}
# (gateway proxy về service tương ứng — xem GatewayRoutesConfig).
springdoc:
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    urls:
      - name: auth-service
        url: /v3/api-docs/auth
      - name: customers-service
        url: /v3/api-docs/customers
      - name: vets-service
        url: /v3/api-docs/vets
      - name: visits-service
        url: /v3/api-docs/visits
      - name: workflow-service
        url: /v3/api-docs/workflow
      - name: billing-service
        url: /v3/api-docs/billing
  api-docs:
    enabled: false                          # gateway tự không có endpoint nghiệp vụ — tắt spec riêng
  show-actuator: false

resilience4j:
  circuitbreaker:
    configs:
      default:
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 5s
        permitted-number-of-calls-in-half-open-state: 3
        slow-call-duration-threshold: 2s
        slow-call-rate-threshold: 80
    instances:
      customersCircuitBreaker:
        base-config: default
      vetsCircuitBreaker:
        base-config: default
      visitsCircuitBreaker:
        base-config: default
      billingCircuitBreaker:
        base-config: default
      authCircuitBreaker:
        base-config: default
      # Genai: LLM streaming có thể chạy 30-120s. Threshold nới lỏng — chỉ trip khi
      # OpenRouter thực sự chết, không phải khi response chậm bình thường.
      genaiCircuitBreaker:
        base-config: default
        slow-call-duration-threshold: 60s
        failure-rate-threshold: 80
  timelimiter:
    configs:
      default:
        timeout-duration: 3s
        cancel-running-future: true
    instances:
      customersCircuitBreaker:
        base-config: default
      vetsCircuitBreaker:
        base-config: default
      visitsCircuitBreaker:
        base-config: default
      billingCircuitBreaker:
        base-config: default
      authCircuitBreaker:
        base-config: default
      # LLM streaming + RAG retrieval: 90s đủ cho most responses; CB sẽ vẫn trip nếu
      # downstream stuck. cancel-running-future=false để stream cancel không kill connection.
      genaiCircuitBreaker:
        timeout-duration: 90s
        cancel-running-future: false

  # Bulkhead — semaphore variant: giới hạn số call concurrent per downstream service.
  # Khác CircuitBreaker (chặn khi đã hỏng) + TimeLimiter (cắt khi quá lâu) — Bulkhead chặn
  # khi quá NHIỀU call đang inflight cùng lúc → bảo vệ tài nguyên (DB pool, memory, $$$ LLM cost).
  #
  # Sizing theo Little's Law: L = λ × W (concurrent = throughput × latency).
  # Cấp 3-5× baseline để có headroom burst, vượt → fail-fast.
  bulkhead:
    configs:
      default:
        max-concurrent-calls: 25            # 25 đồng thời/instance; ~500 req/s ở latency 50ms
        max-wait-duration: 0ms              # fail-fast — không xếp hàng
    instances:
      customersBulkhead:
        base-config: default
      vetsBulkhead:
        base-config: default
      visitsBulkhead:
        base-config: default
      billingBulkhead:
        base-config: default
      authBulkhead:
        max-concurrent-calls: 50            # auth login burst lúc peak hour, nới hơn
        max-wait-duration: 0ms
      # Genai: LLM call mỗi cái tốn $$$ + chậm 5-30s + OpenRouter rate-limit 60 req/min.
      # 5 concurrent là tối đa hợp lý cho dev key. Vượt → trả 503 ngay, user retry.
      genaiBulkhead:
        max-concurrent-calls: 5
        max-wait-duration: 0ms
