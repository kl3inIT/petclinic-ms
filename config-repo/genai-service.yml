# genai-service — env-agnostic config.

spring:
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: genai
        format_sql: true
    open-in-view: false

  # Liquibase quản changelog table trong `public` (default), nhưng từng changeset chỉ định
  # schemaName: genai. KHÔNG set `default-schema: genai` — schema chưa tồn tại lúc Liquibase
  # khởi tạo DATABASECHANGELOG → chicken-and-egg fail. Pattern này áp cho mọi service trong project.
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

  ai:
    # ⚠️ Gotcha #33 — TẮT hết model auto-config trừ chat. spring-ai-openai eagerly create
    # 5 model beans (chat/embedding/image/audio/moderation), tất cả require api-key.
    # genai-service tự build OpenAiChatModel trong ChatClientConfig → tắt chat auto-config luôn
    # (set =none) cho an toàn.
    model:
      chat: none
      # TẮT embedding auto-config — EmbeddingConfig wire OpenAiEmbeddingModel manually
      # với baseUrl + apiKey riêng (petclinic.ai.embedding.*). Để auto-config on sẽ ép
      # phải set spring.ai.openai.api-key duplicate, conflict với bean của ta.
      # PgVectorStore tự inject @Primary bean của EmbeddingConfig — không cần autoconfig.
      embedding: none
      embedding.multimodal: none
      image: none
      audio.speech: none
      audio.transcription: none
      moderation: none

    # PgVectorStore auto-config (Phase 12d RAG). Schema do Liquibase tạo
    # (genai.vector_store), tắt initialize-schema để khỏi đè.
    vectorstore:
      pgvector:
        schema-name: genai
        table-name: vector_store
        initialize-schema: false
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        dimensions: ${PETCLINIC_EMBEDDING_DIMENSIONS:1536}

    # Spring AI 2.0 cho phép log prompt/completion qua observation. Learning project —
    # BẬT để debug dễ. Production: tắt cả 2 (PII + cost của log volume).
    chat:
      client:
        observations:
          log-prompt: true
      observations:
        log-prompt: true
        log-completion: true

    # MCP client — Spring AI 2.0 Streamable HTTP transport (SSE deprecated).
    # mcp-server expose protocol STREAMABLE ở /mcp; client phải match.
    # Property prefix verified ở McpStreamableHttpClientProperties: spring.ai.mcp.client.streamable-http
    mcp:
      client:
        type: SYNC
        request-timeout: 30s
        streamable-http:
          connections:
            petclinic-mcp:
              url: http://mcp-server:8187
              # endpoint optional — default /mcp khớp với mcp-server config.

# Petclinic AI properties — env-driven (Phase 12b). Phase 12c sẽ thêm admin endpoint
# persist DB + AES-GCM encrypt api-key.
petclinic:
  ai:
    llm:
      base-url: ${PETCLINIC_LLM_BASE_URL:https://openrouter.ai/api/v1}
      api-key: ${PETCLINIC_LLM_API_KEY:}
      chat-model: ${PETCLINIC_LLM_CHAT_MODEL:anthropic/claude-3.5-haiku}
      read-timeout: 60s
    chat:
      temperature: 0.7
      memory-max-messages: 10

    # Phase 12d — RAG embedding. Empty api-key → skip RAG, chat vẫn chạy.
    # OpenRouter KHÔNG hỗ trợ /embeddings; phải OpenAI direct hoặc Ollama local:
    #   - OpenAI:  base-url=https://api.openai.com/v1,  api-key=sk-...,    model=text-embedding-3-small (dim 1536)
    #   - Ollama:  base-url=http://localhost:11434/v1, api-key=ollama,    model=nomic-embed-text (dim 768)
    embedding:
      base-url: ${PETCLINIC_EMBEDDING_BASE_URL:https://api.openai.com/v1}
      api-key: ${PETCLINIC_EMBEDDING_API_KEY:}
      model: ${PETCLINIC_EMBEDDING_MODEL:text-embedding-3-small}
      dimensions: ${PETCLINIC_EMBEDDING_DIMENSIONS:1536}

# Crypto config — AES-GCM key dùng encrypt apiKey lưu DB. Set qua env (`PETCLINIC_CRYPTO_KEY`).
# Trống → AesGcmEncryptor auto-generate ephemeral key (cảnh báo log) — OK cho dev local,
# KHÔNG ok cho prod (restart sẽ làm DB row unreadable).
petclinic.crypto.key: ${PETCLINIC_CRYPTO_KEY:}

# RBAC — Least Privilege (slide MSS301 #70). Reactive variant ở
# ReactiveEndpointSecurityCustomizer (genai-service dùng WebFlux stack).
petclinic:
  security:
    endpoints:
      # USER+ — chat endpoints (USER nói chuyện với pet care AI)
      user:
        - { path: /api/v1/ai/** }
      # Admin only — LLM config (BYOK API key, model selection, validate)
      admin:
        - { path: /api/v1/admin/llm/** }

management:
  endpoints:
    web:
      exposure:
        include: "*"

logging:
  level:
    org.springframework.ai: DEBUG
    com.mss301.petclinic.genai: DEBUG
