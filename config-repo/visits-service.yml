# Visits — env-agnostic config.
petclinic:
  workflow:
    # Phải khớp với petclinic.workflow.callback-token bên workflow-service.
    # Override qua env var PETCLINIC_WORKFLOW_CALLBACK_TOKEN trong prod.
    callback-token: ${PETCLINIC_WORKFLOW_CALLBACK_TOKEN:petclinic-workflow-secret}
    # Quy trình Camunda 8 được start tự động khi đặt lịch mới.
    # Đổi key này khi muốn lịch mới chạy theo bản quy trình khác.
    visit-booking-process-id: ${PETCLINIC_WORKFLOW_VISIT_BOOKING_PROCESS_ID:visit-booking}

  security:
    endpoints:
      # Authenticated user — list + detail + book + cancel. Per-instance ownership
      # check là @PreAuthorize ở controller, không phải URL pattern.
      user:
        - { method: GET,   path: /api/v1/visits/** }
        - { method: POST,  path: /api/v1/visits }
        - { method: PATCH, path: /api/v1/visits/*/cancel }
      # Custom domain role — vet hoặc admin start/complete visit (write clinical data)
      custom-roles:
        VET:
          - { method: PATCH, path: /api/v1/visits/*/start }
          - { method: PATCH, path: /api/v1/visits/*/complete }
          # Kê đơn thuốc — chỉ VET (+ADMIN). GET/GET pdf reach hardcode trong VisitsSecurityConfig.
          - { method: POST,  path: /api/v1/visits/*/prescription }
      # STAFF dùng bucket user để đặt, xem và huỷ lịch tại quầy. Bắt đầu/hoàn tất
      # khám và kê đơn là nghiệp vụ lâm sàng, chỉ VET (+ ADMIN override) thực hiện.

  # Đơn thuốc — PDF binary đi qua Go files-service; visits giữ metadata lâm sàng.
  files:
    base-url: ${FILES_SERVICE_URL:http://localhost:8193}
    bucket: ${FILES_BUCKET:prescriptions}
    presigned-ttl: PT1H
    max-file-size-bytes: 10485760  # 10 MB

# Datasource creds + URL khác env → visits-service-<profile>.yml.

spring:
  jpa:
    hibernate:
      ddl-auto: validate                  # Liquibase quản lý schema
    properties:
      hibernate:
        default_schema: visits
        format_sql: true
    open-in-view: false

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

# Resilience4j cho cross-service calls trong VisitServiceImpl.
# Instance name = `@CircuitBreaker(name="...")` trong code → keep tên đồng bộ.
#
# Failure semantics:
#   * 4xx (NotFound, BadRequest...) — service HEALTHY, data missing → ignore, không count failure.
#   * 5xx, IOException, timeout — service UNHEALTHY → count, fallback.
#
# Sliding window 10 call, threshold 50% → 5/10 fail → OPEN 30s → HALF_OPEN cho 3 call test.
# Cần ≥ 5 call (minimum-number-of-calls) mới đánh giá — tránh OPEN ngay với traffic thấp.
resilience4j:
  circuitbreaker:
    configs:
      default:
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
        # Service healthy nhưng data 404 — KHÔNG phải tín hiệu fault. Không trigger fallback.
        # Eureka LB throw IllegalStateException("No instances available"), RestClient throw
        # ResourceAccessException, downstream 5xx → HttpServerErrorException... muôn hình vạn
        # trạng nên dùng `ignore-exceptions` whitelist sau đó cho phép R4j count mặc định mọi
        # exception còn lại là failure. KHÔNG dùng `record-exceptions` (whitelist hẹp dễ miss).
        ignore-exceptions:
          - org.springframework.web.client.HttpClientErrorException$NotFound
          - org.springframework.web.client.HttpClientErrorException$BadRequest
          - org.springframework.web.client.HttpClientErrorException$Unauthorized
          - org.springframework.web.client.HttpClientErrorException$Forbidden
          - com.mss301.petclinic.common.web.exception.BadRequestAlertException
    instances:
      customers-service:
        base-config: default
      vets-service:
        base-config: default
      auth-service:
        base-config: default
      products-service:
        base-config: default

  # Cap call duration — không cho block lâu hơn 3s (default 30s là quá thương downstream).
  # Vượt → TimeoutException → recorded failure → đẩy CB về OPEN nhanh.
  timelimiter:
    instances:
      customers-service:
        timeout-duration: 3s
      vets-service:
        timeout-duration: 3s
      auth-service:
        timeout-duration: 3s
      products-service:
        timeout-duration: 3s
