# Auth-service prod — env-driven creds + JWT secret PHẢI từ env.

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    properties:
      hibernate:
        format_sql: false

# JWT secret ở config-repo/application-prod.yml (shared).

logging:
  level:
    org.hibernate.SQL: WARN
    org.springframework.security: INFO
