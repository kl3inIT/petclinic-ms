# Auth-service dev — datasource fallback + JWT dev secret.

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/petclinic?currentSchema=auth}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

# JWT secret moved to config-repo/application-dev.yml (Iter 2 — shared by mọi service).
# Auth-service ttl + algorithm-specific config có thể ở đây nếu cần.

logging:
  level:
    org.hibernate.SQL: INFO
    org.springframework.security: DEBUG   # dev: verbose security log để debug filter chain
