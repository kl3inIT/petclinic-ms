# Products dev — datasource từ compose Postgres.

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/petclinic?currentSchema=products}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  docker:
    compose:
      profiles:
        active: ["db"]

logging:
  level:
    org.hibernate.SQL: INFO
    com.mss301.petclinic.products: DEBUG
