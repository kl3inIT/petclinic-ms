# Visits dev — datasource từ compose Postgres.

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/petclinic?currentSchema=visits}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  # Visits publish visit.scheduled / visit.completed → cần RabbitMQ.
  # Prescription PDF đi qua files-service/MinIO → thêm profile `storage`.
  docker:
    compose:
      profiles:
        active: ["db", "mq", "storage"]

logging:
  level:
    org.hibernate.SQL: INFO
    com.mss301.petclinic.visits: DEBUG
