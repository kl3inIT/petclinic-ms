# Vets — env-agnostic.

spring:
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: vets
        format_sql: true
    open-in-view: false

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

  # Phase E2 — raise multipart limits cho upload photo/album. Spring Boot mặc định
  # max-file-size 1MB / max-request-size 10MB → cản 10MB single file. Set theo
  # decision của project: 10MB max (cộng overhead form → 11MB request).
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 11MB

# Binary file access goes through Go files-service. Vets keeps review metadata
# and calls files-service for upload/delete/presigned URL/list.
petclinic:
  files:
    base-url: ${FILES_SERVICE_URL:http://localhost:8193}
    bucket: ${FILES_BUCKET:avatars}
    presigned-ttl: PT1H
    max-file-size-bytes: 10485760  # 10 MB
    # Phase I — orphan-cleanup job. Disable bằng MINIO_CLEANUP_ENABLED=false ở env nếu
    # job overlap với backup/maintenance window. Dry-run bật tuần đầu prod để verify.
    cleanup:
      enabled: ${MINIO_CLEANUP_ENABLED:true}
      dry-run: ${MINIO_CLEANUP_DRY_RUN:false}
      cron: ${MINIO_CLEANUP_CRON:0 0 3 * * *}
      min-age: ${MINIO_CLEANUP_MIN_AGE:PT1H}

  # RBAC — Least Privilege pattern (slide MSS301 #70).
  # Áp bởi EndpointSecurityCustomizer trong VetsSecurityConfig. Source of truth duy nhất
  # cho ai access endpoint nào — đổi role không sửa code, chỉ sửa YAML.
  #
  # Thứ tự apply trong customizer: public → admin → staff → user (specific trước, broad sau).
  #
  # NOTE: /me endpoints dành cho VET (+ ADMIN override) được hardcode trong
  # VetsSecurityConfig.java vì custom role VET cần đứng trước rule GET /vets/**.
  security:
    endpoints:
      # Mọi user authenticated đều xem được catalog vet + specialty
      user:
        - { method: GET, path: /api/v1/vets/** }
        - { method: GET, path: /api/v1/specialties/** }
      # Quản trị hồ sơ, lịch trực và ảnh bác sĩ chỉ dành cho ADMIN. STAFF là
      # lễ tân/thu ngân: vẫn đọc catalog bác sĩ qua bucket user nhưng không sửa.
      admin:
        - { method: POST,  path: /api/v1/vets }
        - { method: PATCH, path: /api/v1/vets/** }
        - { method: PUT,   path: /api/v1/vets/** }
        # Review queue + approve/reject ảnh — ADMIN only
        # (education đã chuyển sang CRUD trần, không còn approve/reject)
        - { method: GET,   path: /api/v1/vets/reviews/** }
        - { method: POST,  path: /api/v1/vets/*/photo/approve }
        - { method: POST,  path: /api/v1/vets/*/photo/reject }
        - { method: DELETE, path: /api/v1/vets/** }
        - { path: /api/v1/specialties/** }   # mọi non-GET trên specialties
