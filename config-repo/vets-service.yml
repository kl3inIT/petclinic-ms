# Vets — env-agnostic.

spring:
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: vets
        format_sql: true
    open-in-view: false

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

  # Phase E2 — raise multipart limits cho upload photo/album. Spring Boot mặc định
  # max-file-size 1MB / max-request-size 10MB → cản 10MB single file. Set theo
  # decision của project: 10MB max (cộng overhead form → 11MB request).
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 11MB

# Phase E2 — S3-compatible storage config. Local dev dùng MinIO ở compose profile `storage`.
# Override ở -prod env cho AWS S3 thật (endpoint + IAM creds).
petclinic:
  storage:
    minio:
      endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
      access-key: ${MINIO_ACCESS_KEY:minioadmin}
      secret-key: ${MINIO_SECRET_KEY:minioadmin}
      bucket: ${MINIO_BUCKET:avatars}
      presigned-ttl: PT1H
      max-file-size-bytes: 10485760  # 10 MB
